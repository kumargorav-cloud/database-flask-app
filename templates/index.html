{% extends "base.html" %}
{% block title %}Default{% endblock %}

{% block content %}

<h1>this is html file</h1>
<ul>
    {% for person in people %}
    <li>{{ person }}<button onclick="deletePerson({{ person.pid }})">Delete</button></li>
    {% endfor %}
</ul>

<h3>New Person</h3>
<form action="{{ url_for('index') }}" method="POST">
    <input type="text" name="name" placeholder="name" required="required" id="">
    <input type="number" name="age" placeholder="age">
    <input type="text" name="job" placeholder="job" id="">
    <input type="submit" value="create" id="">
</form>

<script type="text/javascript">
    function deletePerson(pid) {
        fetch('{{ url_for("delete",pid=pid) }}' + pid, {
            method: "DELETE",
        }).then(response => {
            if (response.ok) {
                window.location.reload();
            } else {
                console.error("failed to delete item with pid:", pid);
            }
        }).catch(error => {
            console.error("Error during fetching:", error)
        })
    }
</script>

{% endblock %}
